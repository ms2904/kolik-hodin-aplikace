<script>
  window.storage = {
    get: async (key) => {
      const v = localStorage.getItem(key);
      if (v === null) throw new Error("not found");
      return { key, value: v, shared: false };
    },
    set: async (key, value) => {
      localStorage.setItem(key, value);
      return { key, value, shared: false };
    },
    delete: async (key) => {
      localStorage.removeItem(key);
      return { key, deleted: true, shared: false };
    },
    list: async (prefix) => {
      const keys = Object.keys(localStorage).filter((k) => !prefix || k.startsWith(prefix));
      return { keys, prefix, shared: false };
    },
  };

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>

function ensureFonts() {
  if (typeof document === "undefined" || document.getElementById(FONT_ID)) return;
  const link = document.createElement("link");
  link.id = FONT_ID;
  link.rel = "stylesheet";
  link.href =
    "https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap";
  document.head.appendChild(link);
}

function loadTesseract() {
  return new Promise((resolve, reject) => {
    if (window.Tesseract) return resolve();
    if (document.getElementById(TESS_ID)) {
      document.getElementById(TESS_ID).addEventListener("load", () => resolve());
      return;
    }
    const s = document.createElement("script");
    s.id = TESS_ID;
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js";
    s.onload = () => resolve();
    s.onerror = () => reject(new Error("load failed"));
    document.head.appendChild(s);
  });
}

function shade(hex, percent) {
  const num = parseInt(hex.replace("#", ""), 16);
  let r = (num >> 16) + Math.round((255 * percent) / 100);
  let g = ((num >> 8) & 0x00ff) + Math.round((255 * percent) / 100);
  let b = (num & 0x0000ff) + Math.round((255 * percent) / 100);
  r = Math.max(Math.min(255, r), 0);
  g = Math.max(Math.min(255, g), 0);
  b = Math.max(Math.min(255, b), 0);
  return `#${((r << 16) | (g << 8) | b).toString(16).padStart(6, "0")}`;
}

function formatMoney(n, currency) {
  const c = CURRENCIES[currency] || CURRENCIES.CZK;
  return n.toLocaleString(c.locale, { maximumFractionDigits: 2 }) + " " + c.symbol;
}

function formatHours(hoursDecimal, lang) {
  const s = STR[lang] || STR.cs;
  const totalMinutes = Math.round(Math.abs(hoursDecimal) * 60);
  const sign = hoursDecimal < 0 ? "-" : "";
  const h = Math.floor(totalMinutes / 60);
  const m = totalMinutes % 60;
  if (h === 0) return { big: `${sign}${m}`, unit: s.min };
  let unit;
  if (lang === "cs") unit = h === 1 ? s.hUnit1 : h < 5 ? s.hUnit2 : s.hUnit5;
  else unit = s.hUnit1;
  if (m === 0) return { big: `${sign}${h}`, unit };
  return { big: `${sign}${h}:${String(m).padStart(2, "0")}`, unit: "h" };
}

function formatDuration(hoursDecimal, unit, lang) {
  const s = STR[lang] || STR.cs;
  if (unit === "minutes") {
    const sign = hoursDecimal < 0 ? "-" : "";
    const total = Math.round(Math.abs(hoursDecimal) * 60);
    return { big: `${sign}${total}`, unit: s.min };
  }
  if (unit === "days") {
    const sign = hoursDecimal < 0 ? "-" : "";
    const days = Math.abs(hoursDecimal) / WORKDAY_HOURS;
    const rounded = Math.round(days * 10) / 10;
    const isWhole = Number.isInteger(rounded);
    let label;
    if (lang === "cs") label = rounded === 1 ? s.dayUnit1 : isWhole && rounded >= 2 && rounded < 5 ? s.dayUnit2 : s.dayUnit5;
    else label = rounded === 1 ? s.dayUnit1 : s.dayUnit5;
    return { big: `${sign}${isWhole ? rounded : rounded.toFixed(1)}`, unit: label };
  }
  return formatHours(hoursDecimal, lang);
}

function toLocalInputValue(d) {
  const pad = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function timeLeft(ms) {
  if (ms <= 0) return "";
  const totalSec = Math.floor(ms / 1000);
  const d = Math.floor(totalSec / 86400);
  const h = Math.floor((totalSec % 86400) / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  if (d > 0) return `${d}d ${h}h`;
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m ${s}s`;
  return `${s}s`;
}

function extractPrice(text) {
  const matches = text.match(/\d{1,3}(?:[ ,.]\d{3})*(?:[.,]\d{1,2})?/g) || [];
  const nums = matches
    .map((m) => {
      let clean = m.trim();
      const decMatch = clean.match(/^(.*?)[.,](\d{2})$/);
      if (decMatch) {
        const intPart = decMatch[1].replace(/[ ,.]/g, "");
        return parseFloat(intPart + "." + decMatch[2]);
      }
      return parseFloat(clean.replace(/[ ,.]/g, ""));
    })
    .filter((n) => !isNaN(n) && n > 0 && n < 1000000);
  if (!nums.length) return null;
  return Math.max(...nums);
}

function useWindowWidth() {

  useEffect(() => {
    function onResize() {

    }
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);
  return width;
}

  return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2) + Date.now();

function weekKey(ts) {
  const d = new Date(ts);
  const onejan = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil(((d - onejan) / DAY + onejan.getDay() + 1) / 7);
  return `${d.getFullYear()}-${week}`;
}

  { id: "first_decline", icon: "🌱", type: "decline", threshold: 1, titleKey: "achFirstDeclineTitle", descKey: "achFirstDeclineDesc" },
  { id: "ten_declines", icon: "🔥", type: "decline", threshold: 10, titleKey: "achTenDeclinesTitle", descKey: "achTenDeclinesDesc" },
  { id: "fifty_declines", icon: "🏆", type: "decline", threshold: 50, titleKey: "achFiftyDeclinesTitle", descKey: "achFiftyDeclinesDesc" },
  { id: "streak_7", icon: "🗓️", type: "streak", threshold: 7, titleKey: "achStreak7Title", descKey: "achStreak7Desc" },
  { id: "streak_30", icon: "💪", type: "streak", threshold: 30, titleKey: "achStreak30Title", descKey: "achStreak30Desc" },
  { id: "hours_10", icon: "⏳", type: "hours", threshold: 10, titleKey: "achHours10Title", descKey: "achHours10Desc" },
  { id: "hours_50", icon: "⌛", type: "hours", threshold: 50, titleKey: "achHours50Title", descKey: "achHours50Desc" },
];

function computeUnlockedAchievements(declineCount, streakLongest, savedHoursTotal) {
  return ACHIEVEMENTS.filter((a) => {
    if (a.type === "decline") return declineCount >= a.threshold;
    if (a.type === "streak") return streakLongest >= a.threshold;
    if (a.type === "hours") return savedHoursTotal >= a.threshold;
    return false;
  }).map((a) => a.id);
}

function achievementProgress(a, declineCount, streakLongest, savedHoursTotal) {
  if (a.type === "decline") return { current: Math.min(declineCount, a.threshold), target: a.threshold };
  if (a.type === "streak") return { current: Math.min(streakLongest, a.threshold), target: a.threshold };
  if (a.type === "hours") return { current: Math.round(Math.min(savedHoursTotal, a.threshold) * 10) / 10, target: a.threshold };
  return null;
}

function computeStreaks(history) {
  const purchases = history.filter((h) => DECISION_POSITIVE[h.decision]).sort((a, b) => a.ts - b.ts);
  if (!purchases.length) return { current: 0, longest: 0 };
  let longest = 0;
  for (let i = 1; i < purchases.length; i++) {
    longest = Math.max(longest, Math.floor((purchases[i].ts - purchases[i - 1].ts) / DAY));
  }
  const current = Math.floor((Date.now() - purchases[purchases.length - 1].ts) / DAY);
  longest = Math.max(longest, current);
  return { current, longest };
}

function lastCategoryInsight(history, categoryId) {
  const past = history
    .filter((h) => h.category === categoryId && h.followup)
    .sort((a, b) => b.ts - a.ts);
  return past[0] || null;
}

function effectiveRate(r) {
  if (r.useGross && r.gross > 0) return r.gross * (1 - (r.deduction || 0) / 100);
  return r.rate;
}

async function fetchFxRate(from, to) {
  if (from === to) return 1;
  const res = await fetch(`https://api.frankfurter.app/latest?from=${from}&to=${to}`);
  if (!res.ok) throw new Error("fx failed");
  const data = await res.json();
  const rate = data.rates && data.rates[to];
  if (!rate) throw new Error("no rate");
  return rate;
}

async function generateShareImage(result, rate, currency, lang, t, s, catLabel, unit) {
  await (document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve());
  const canvas = document.createElement("canvas");
  canvas.width = 800;
  canvas.height = 1000;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = t.ticket;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = t.accent;
  ctx.font = "24px Inter, sans-serif";
  ctx.fillText(`${catLabel} · ${formatMoney(result.price, currency)}`, 50, 90);
  ctx.fillStyle = "#F5EFE6";
  ctx.font = "700 130px Fraunces, serif";
  const df = formatDuration(result.hours, unit || "hours", lang);
  ctx.fillText(df.big, 50, 260);
  ctx.font = "32px Inter, sans-serif";
  ctx.fillStyle = t.accent;
  ctx.fillText(df.unit, 50, 310);
  ctx.fillStyle = "#F5EFE6";
  ctx.globalAlpha = 0.65;
  ctx.font = "22px Inter, sans-serif";
  ctx.fillText(`${s.atRate} ${rate.toLocaleString(LOCALES[lang])} ${CURRENCIES[currency].symbol}/h`, 50, 360);
  ctx.globalAlpha = 1;
  ctx.font = "700 22px Fraunces, serif";
  ctx.fillStyle = t.accent;
  ctx.fillText("Kolik hodin?", 50, canvas.height - 50);
  return new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
}

  return { ...c, label };
}

      }
    })();
  }, [lang, currency, rates, activeRateId, categories, recurring, themeName, notifiedIds, seenAchievements, walkthroughDone, setupDone, pending, history, loaded]);

  useEffect(() => {
    tick.current = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(tick.current);
  }, []);

  useEffect(() => {
    if (!loaded || setupDone || onboardStep !== "splash") return;
    const timer = setTimeout(() => setOnboardStep("lang"), 1400);
    return () => clearTimeout(timer);
  }, [loaded, setupDone, onboardStep]);

  useEffect(() => {
    if (!loaded || !setupDone) return;
    try {
      const params = new URLSearchParams(window.location.search);
      const qCat = params.get("cat");
      const qPrice = params.get("price");
      if (qCat || qPrice) {
        setTab("home");
        if (qCat) setCategory(qCat);
        if (qPrice) setPrice(qPrice);
      }
    } catch (e) {}
  }, [loaded, setupDone]);

  const rate = effectiveRate(rates.find((r) => r.id === activeRateId) || rates[0] || { rate: 300 });

  useEffect(() => {
    if (notifPerm !== "granted") return;
    pending.forEach((item) => {
      if (item.until <= now && !notifiedIds.includes(item.id)) {
        try {
          new Notification(s.pending, { body: `${getCategory(categories, item.category, lang).label} · ${formatMoney(item.price, currency)}` });
        } catch (e) {}
        setNotifiedIds((n) => [...n, item.id]);
      }
    });
  }, [now, pending, notifPerm]); // eslint-disable-line

  const followupsDue = useMemo(
    () => history.filter((h) => (h.decision === "worth_it" || h.decision === "bought_after_thinking") && !h.followup && now - h.ts >= 3 * DAY),
    [history, now]
  );

  useEffect(() => {
    if (notifPerm !== "granted") return;
    followupsDue.forEach((h) => {
      const fid = "followup-" + h.id;
      if (!notifiedIds.includes(fid)) {
        try {
          new Notification(s.followupTitle, { body: getCategory(categories, h.category, lang).label });
        } catch (e) {}
        setNotifiedIds((n) => [...n, fid]);
      }
    });
  }, [followupsDue, notifPerm]); // eslint-disable-line

  function finishOnboarding() {
    const v = parseFloat(onboardRate.replace(",", "."));
    if (!(v > 0)) return;
    setRates([{ id: "main", label: "Hlavní sazba", rate: v }]);
    setActiveRateId("main");
    setCurrency(onboardCurrency);
    setLang(onboardLang);
    setSetupDone(true);
  }

  const priceNum = parseFloat((price || "").replace(",", "."));

  useEffect(() => {
    if (priceNum > 0 && rate > 0) {
      const cat = category || "ostatni";
      setResult({ category: cat, price: priceNum, hours: priceNum / rate });
    } else {
      setResult(null);
      setPickingDuration(false);
    }
  }, [priceNum, rate, category]);

  function resetForm() {
    setCategory(null);
    setPrice("");
    setResult(null);
    setPickingDuration(false);
    setScanNote("");
  }

  function decide(kind) {
    if (!result) return;
    setHistory((h) => [{ id: uid(), category: result.category, price: result.price, hours: result.hours, decision: kind, ts: Date.now(), currency }, ...h]);
    resetForm();
  }

  function startThinking(ms) {
    if (!result) return;
    setPending((p) => [{ id: uid(), category: result.category, price: result.price, hours: result.hours, until: Date.now() + ms }, ...p]);
    resetForm();
  }

  function resolvePending(item, kind) {
    setPending((p) => p.filter((x) => x.id !== item.id));
    setHistory((h) => [{ id: uid(), category: item.category, price: item.price, hours: item.hours, decision: kind, ts: Date.now(), currency }, ...h]);
  }

  function answerFollowup(h, glad) {
    setHistory((hist) => hist.map((x) => (x.id === h.id ? { ...x, followup: glad ? "glad" : "regret" } : x)));
  }

  function undoLast() {
    setHistory((h) => h.slice(1));
  }

  function deleteHistoryEntry(id) {
    setHistory((h) => h.filter((x) => x.id !== id));
  }

  function deletePendingEntry(id) {
    setPending((p) => p.filter((x) => x.id !== id));
  }

  function resetApp() {
    setSetupDone(false);
    setOnboardStep("splash");
    setLang("cs");
    setCurrency("CZK");
    setRates([{ id: "main", label: "Hlavní sazba", rate: 300 }]);
    setActiveRateId("main");
    setCategories(DEFAULT_CATEGORIES);
    setRecurring([]);
    setThemeName("ink-dark");
    setNotifiedIds([]);
    setWalkthroughDone(false);
    setPending([]);
    setHistory([]);
    setCategory(null);
    setPrice("");
    setResult(null);
  }

  async function requestNotifications() {
    if (typeof Notification === "undefined") return;
    const perm = await Notification.requestPermission();
    setNotifPerm(perm);
  }

  async function handleScan(e) {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    setScanning(true);
    setScanNote("");
    try {
      await loadTesseract();
      const { data } = await window.Tesseract.recognize(file, "eng");
      const found = extractPrice(data.text || "");
      if (found) {
        setPrice(String(found));
        setScanNote(s.scanFound);
      } else {
        setScanNote(s.scanNotFound);
      }
    } catch (err) {
      setScanNote(s.scanFailed);
    } finally {
      setScanning(false);
    }
  }

  function exportJSON() {
    const backup = {
      _type: "kolik-hodin-backup",
      _version: 1,
      lang,
      currency,
      rates,
      activeRateId,
      categories,
      recurring,
      themeName,
      pending,
      history,
    };
    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
    downloadBlob(blob, "kolik-hodin-zaloha.json");
  }

  const [importState, setImportState] = useState(null); // 'success' | 'error' | null

  async function importBackup(file) {
    setImportState(null);
    try {
      const text = await file.text();
      const d = JSON.parse(text);
      if (typeof d !== "object" || d === null) throw new Error("bad format");
      if (d.lang) setLang(d.lang);
      if (d.currency) setCurrency(d.currency);
      if (Array.isArray(d.rates) && d.rates.length) setRates(d.rates);
      if (d.activeRateId) setActiveRateId(d.activeRateId);
      if (Array.isArray(d.categories) && d.categories.length) setCategories(d.categories);
      if (Array.isArray(d.recurring)) setRecurring(d.recurring);
      if (typeof d.themeName === "string") setThemeName(d.themeName);
      if (Array.isArray(d.pending)) setPending(d.pending);
      if (Array.isArray(d.history)) setHistory(d.history);
      setImportState("success");
    } catch (e) {
      setImportState("error");
    }
  }

  function exportCSV() {
    const rows = [["date", "category", "price", "hours", "decision"]];
    history.forEach((h) => {
      rows.push([
        new Date(h.ts).toLocaleString(LOCALES[lang]),
        getCategory(categories, h.category, lang).label,
        h.price,
        h.hours.toFixed(2),
        decisionLabel(h.decision, s),
      ]);
    });
    const csv = rows.map((r) => r.map((c) => `"${String(c).replace(/"/g, '""')}"`).join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    downloadBlob(blob, "kolik-hodin-historie.csv");
  }

  function downloadBlob(blob, name) {
    try {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = name;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 2000);
    } catch (e) {}
  }

  async function shareResult(unit) {
    if (!result) return;
    try {
      const catLabel = getCategory(categories, result.category, lang).label;
      const blob = await generateShareImage(result, rate, currency, lang, t, s, catLabel, unit);
      if (!blob) return;
      const file = new File([blob], "kolik-hodin.png", { type: "image/png" });
      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: "Kolik hodin?" });
      } else {
        downloadBlob(blob, "kolik-hodin.png");
      }
    } catch (e) {
      try {
        const catLabel = getCategory(categories, result.category, lang).label;
        const blob = await generateShareImage(result, rate, currency, lang, t, s, catLabel, unit);
        if (blob) downloadBlob(blob, "kolik-hodin.png");
      } catch (e2) {}
    }
  }

  const savedHoursTotal = useMemo(() => history.filter((h) => !DECISION_POSITIVE[h.decision]).reduce((sum, h) => sum + h.hours, 0), [history]);
  const streaks = useMemo(() => computeStreaks(history), [history, now]);
  const declineCount = useMemo(() => history.filter((h) => !DECISION_POSITIVE[h.decision]).length, [history]);
  const unlockedAchievements = useMemo(
    () => computeUnlockedAchievements(declineCount, streaks.longest, savedHoursTotal),
    [declineCount, streaks.longest, savedHoursTotal]
  );

  useEffect(() => {
    if (!loaded) return;
    const fresh = unlockedAchievements.find((id) => !seenAchievements.includes(id));
    if (fresh) setNewAchievement(fresh);
  }, [unlockedAchievements, loaded]); // eslint-disable-line

  function dismissAchievement() {
    if (newAchievement) setSeenAchievements((s) => [...s, newAchievement]);
    setNewAchievement(null);
  }

  const savedHoursMonth = useMemo(() => {
    const monthAgo = now - 30 * DAY;
    return history.filter((h) => !DECISION_POSITIVE[h.decision] && h.ts >= monthAgo).reduce((sum, h) => sum + h.hours, 0);
  }, [history, now]);

  const weeklyChart = useMemo(() => {
    const weeks = [];
    for (let i = 7; i >= 0; i--) {
      const ts = now - i * 7 * DAY;
      weeks.push({ key: weekKey(ts), ts, label: new Date(ts).toLocaleDateString(LOCALES[lang], { day: "2-digit", month: "2-digit" }) });
    }
    const sums = {};
    history.forEach((h) => {
      if (DECISION_POSITIVE[h.decision]) return;
      const k = weekKey(h.ts);
      sums[k] = (sums[k] || 0) + h.hours;
    });
    return weeks.map((w) => ({ ...w, hours: sums[w.key] || 0 }));
  }, [history, now, lang]);
  const maxWeekly = Math.max(1, ...weeklyChart.map((w) => w.hours));

  const recurringMonthlyHours = useMemo(() => recurring.reduce((sum, r) => sum + (r.cycle === "year" ? r.price / 12 : r.price) / rate, 0), [recurring, rate]);

  if (!loaded) return null;

  // ================= Onboarding =================
  if (!setupDone) {
    const os = STR[onboardLang] || STR.cs;

    if (onboardStep === "splash") {
      return (
        <div style={{ fontFamily: "'Inter', sans-serif", minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: t.bg, color: t.text }}>
          <GlobalStyles />
          <div
            style={{
              width: 84,
              height: 84,
              borderRadius: "50%",
              background: `linear-gradient(150deg, ${shade(t.accent, 12)}, ${shade(t.accent, -10)})`,
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              marginBottom: 22,
              boxShadow: `0 10px 28px ${t.ticket}66`,
            }}
          >
            <svg width="38" height="38" viewBox="0 0 38 38">
              <circle cx="19" cy="19" r="17" fill="none" stroke={t.ticket} strokeWidth="2.5" />
              <line x1="19" y1="19" x2="19" y2="9" stroke={t.ticket} strokeWidth="2.5" strokeLinecap="round" />
              <line x1="19" y1="19" x2="26" y2="19" stroke={t.ticket} strokeWidth="2.5" strokeLinecap="round" />
            </svg>
          </div>
          <div style={{ fontFamily: "'Fraunces', serif", fontWeight: 700, fontSize: 24, letterSpacing: "-0.01em" }}>Kolik hodin?</div>
          <div style={{ display: "flex", gap: 6, marginTop: 26 }}>
            {[0, 1, 2].map((i) => (
              <div
                key={i}
                style={{
                  width: 6,
                  height: 6,
                  borderRadius: "50%",
                  background: t.accent,
                  opacity: 0.35,
                  animation: `wh-pulse 1.1s ${i * 0.18}s infinite ease-in-out`,
                }}
              />
            ))}
          </div>
        </div>
      );
    }

    if (onboardStep === "lang") {
      return (
        <div style={{ fontFamily: "'Inter', sans-serif", minHeight: "100vh", display: "flex", justifyContent: "center", background: t.bg, color: t.text }}>
          <GlobalStyles />
          <div style={{ width: "100%", maxWidth: onboardMaxWidth, padding: "60px 22px", display: "flex", flexDirection: "column", justifyContent: "center" }}>
            <div style={{ fontFamily: "'Fraunces', serif", fontWeight: 700, fontSize: 24, marginBottom: 26 }}>{os.language}</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 26 }}>
              {[
                { id: "cs", label: "Čeština" },
                { id: "en", label: "English" },
                { id: "pl", label: "Polski" },
                { id: "es", label: "Español" },
              ].map((l) => (
                <button
                  key={l.id}
                  onClick={() => setOnboardLang(l.id)}
                  style={{
                    padding: "16px 18px",
                    borderRadius: 12,
                    border: onboardLang === l.id ? `1.5px solid ${t.accent}` : `1px solid ${t.border}`,
                    background: onboardLang === l.id ? t.accentBg : t.card,
                    color: t.text,
                    fontWeight: 600,
                    fontSize: 15,
                    textAlign: "left",
                    display: "flex",
                    justifyContent: "space-between",
                    alignItems: "center",
                  }}
                >
                  {l.label}
                  {onboardLang === l.id && <span style={{ color: t.accent }}>✓</span>}
                </button>
              ))}
            </div>
            <button
              onClick={() => setOnboardStep("rate")}
              style={{ width: "100%", background: t.ticket, color: "#fff", border: "none", borderRadius: 12, padding: "13px 0", fontSize: 15, fontWeight: 600 }}
            >
              {(STR[onboardLang] || STR.cs).continue}
            </button>
          </div>
        </div>
      );
    }

    return (
      <div style={{ fontFamily: "'Inter', sans-serif", minHeight: "100vh", display: "flex", justifyContent: "center", background: t.bg, color: t.text }}>
        <GlobalStyles />
        <div style={{ width: "100%", maxWidth: onboardMaxWidth, padding: "56px 22px" }}>
          <div style={{ fontFamily: "'Fraunces', serif", fontWeight: 700, fontSize: 26, marginBottom: 8 }}>{os.appTitle}</div>
          <div style={{ fontSize: 14.5, color: t.subtext, marginBottom: 26, lineHeight: 1.5 }}>{os.onboardDesc}</div>

          <label style={labelStyle(t)}>{os.currency}</label>
          <div style={{ display: "flex", gap: 8, marginBottom: 18 }}>
            {Object.keys(CURRENCIES).map((c) => (
              <button key={c} onClick={() => setOnboardCurrency(c)} style={{ flex: 1, padding: "10px 0", borderRadius: 10, border: onboardCurrency === c ? `1.5px solid ${t.accent}` : `1px solid ${t.border}`, background: onboardCurrency === c ? t.accentBg : t.card, color: t.text, fontWeight: 600, fontSize: 14 }}>
                {c} · {CURRENCIES[c].symbol}
              </button>
            ))}
          </div>

          <label style={labelStyle(t)}>{os.netRate}</label>
          <div style={{ position: "relative" }}>
            <input autoFocus value={onboardRate} onChange={(e) => setOnboardRate(e.target.value)} onKeyDown={(e) => e.key === "Enter" && finishOnboarding()} inputMode="decimal" placeholder="0" style={{ ...inputStyle(t), paddingRight: 56 }} />
            <span style={{ position: "absolute", right: 14, top: 12, color: t.subtext, fontSize: 14, fontWeight: 600 }}>{CURRENCIES[onboardCurrency].symbol}/h</span>
          </div>

          <button
            disabled={!(parseFloat(onboardRate.replace(",", ".")) > 0)}
            onClick={finishOnboarding}
            style={{ marginTop: 22, width: "100%", background: parseFloat(onboardRate.replace(",", ".")) > 0 ? t.ticket : t.border, color: "#fff", border: "none", borderRadius: 12, padding: "13px 0", fontSize: 15, fontWeight: 600 }}
          >
            {os.continue}
          </button>
        </div>
      </div>
    );
  }

  // ================= Main app =================
  return (
    <div style={{ fontFamily: "'Inter', sans-serif", minHeight: "100vh", display: "flex", background: t.bg, color: t.text }}>
      <GlobalStyles />
      {newAchievement && (
        <div
          style={{
            position: "fixed",
            top: 0,
            left: 0,
            right: 0,
            zIndex: 50,
            display: "flex",
            justifyContent: "center",
            padding: "16px 16px 0",
          }}
        >
          <div
            style={{
              width: "100%",
              maxWidth: contentMaxWidth,
              background: t.ticket,
              color: "#F5EFE6",
              borderRadius: 16,
              padding: "16px 18px",
              boxShadow: "0 8px 24px rgba(0,0,0,0.35)",
              display: "flex",
              alignItems: "center",
              gap: 12,
            }}
          >
            <div style={{ fontSize: 30 }}>{ACHIEVEMENTS.find((a) => a.id === newAchievement)?.icon}</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 11, opacity: 0.7, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.04em" }}>{s.achievementUnlockedToast}</div>
              <div style={{ fontFamily: "'Fraunces', serif", fontWeight: 700, fontSize: 15 }}>
                {s[ACHIEVEMENTS.find((a) => a.id === newAchievement)?.titleKey]}
              </div>
            </div>
            <button onClick={dismissAchievement} style={{ background: t.accent, color: "#fff", border: "none", borderRadius: 10, padding: "8px 14px", fontSize: 12.5, fontWeight: 700, cursor: "pointer" }}>
              {s.gotIt}
            </button>
          </div>
        </div>
      )}

      <div style={{ width: sidebarWidth, flexShrink: 0, background: t.card, borderRight: `1px solid ${t.border}`, display: "flex", flexDirection: "column", alignItems: "stretch", paddingTop: 18 }}>
        {[
          { id: "home", label: s.navHome },
          { id: "stats", label: s.navStats },
          { id: "recurring", label: s.navRecurring },
          { id: "settings", label: s.navSettings },
        ].map((tb) => (
          <button
            key={tb.id}
            onClick={() => setTab(tb.id)}
            style={{ background: "none", border: "none", padding: "12px 4px", display: "flex", flexDirection: "column", alignItems: "center", gap: 4, color: tab === tb.id ? t.accent : t.subtext, fontWeight: tab === tb.id ? 700 : 500, borderLeft: tab === tb.id ? `2.5px solid ${t.accent}` : "2.5px solid transparent" }}
          >
            <NavIcon id={tb.id} size={isWide ? 30 : 26} />
            <span style={{ fontSize: isWide ? 11.5 : 10, lineHeight: 1.15 }}>{tb.label}</span>
          </button>
        ))}
      </div>

      <div style={{ flex: 1, display: "flex", justifyContent: "center", overflowY: "auto" }}>
        <div style={{ width: "100%", maxWidth: contentMaxWidth, padding: "24px 16px 40px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
            <h1 style={{ fontFamily: "'Fraunces', serif", fontWeight: 700, fontSize: 21, margin: 0 }}>{s.appTitle}</h1>
            <div style={{ fontSize: 12.5, fontWeight: 600, color: t.subtext }}>
              {rate.toLocaleString(LOCALES[lang])} {CURRENCIES[currency].symbol}/h
            </div>
          </div>

          <div key={tab} className="wh-tabpanel">
            {tab === "home" && (
              <HomeTab t={t} s={s} lang={lang} rates={rates} activeRateId={activeRateId} setActiveRateId={setActiveRateId} categories={categories} category={category} setCategory={setCategory} price={price} setPrice={setPrice} currency={currency} scanning={scanning} scanNote={scanNote} handleScan={handleScan} result={result} rate={rate} pickingDuration={pickingDuration} setPickingDuration={setPickingDuration} decide={decide} startThinking={startThinking} resetForm={resetForm} pending={pending} now={now} resolvePending={resolvePending} followupsDue={followupsDue} answerFollowup={answerFollowup} history={history} deletePendingEntry={deletePendingEntry} shareResult={shareResult} walkthroughDone={walkthroughDone} setWalkthroughDone={setWalkthroughDone} isWide={isWide} />
            )}

            {tab === "stats" && (
              <StatsTab t={t} s={s} lang={lang} currency={currency} categories={categories} savedHoursTotal={savedHoursTotal} savedHoursMonth={savedHoursMonth} weeklyChart={weeklyChart} maxWeekly={maxWeekly} history={history} exportCSV={exportCSV} streaks={streaks} undoLast={undoLast} deleteHistoryEntry={deleteHistoryEntry} unlockedAchievements={unlockedAchievements} declineCount={declineCount} />
            )}

            {tab === "recurring" && (
              <RecurringTab t={t} s={s} currency={currency} recurring={recurring} setRecurring={setRecurring} rate={rate} recurringMonthlyHours={recurringMonthlyHours} lang={lang} />
            )}

            {tab === "settings" && (
              <SettingsTab t={t} s={s} lang={lang} setLang={setLang} themeName={themeName} setThemeName={setThemeName} currency={currency} setCurrency={setCurrency} rates={rates} setRates={setRates} activeRateId={activeRateId} setActiveRateId={setActiveRateId} categories={categories} setCategories={setCategories} notifPerm={notifPerm} requestNotifications={requestNotifications} exportJSON={exportJSON} importBackup={importBackup} importState={importState} resetApp={resetApp} />
            )}
          </div>

          {saveError && <div style={{ fontSize: 11.5, color: t.subtext, textAlign: "center", marginTop: 24 }}>{s.saveError}</div>}
        </div>
      </div>
    </div>
  );
}

// ================= Home tab =================
// ================= Swipe-to-delete wrapper =================
// ================= Nav icons =================
function NavIcon({ id, size = 20 }) {
  const common = { width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 1.7, strokeLinecap: "round", strokeLinejoin: "round" };
  if (id === "home") {
    return (
      <svg {...common}>
        <circle cx="12" cy="12" r="8.2" />
        <line x1="12" y1="12" x2="12" y2="7.3" />
        <line x1="12" y1="12" x2="15.6" y2="12" />
      </svg>
    );
  }
  if (id === "stats") {
    return (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor">
        <rect x="4" y="13" width="3.6" height="7" rx="1" />
        <rect x="10.2" y="8" width="3.6" height="12" rx="1" />
        <rect x="16.4" y="4" width="3.6" height="16" rx="1" />
      </svg>
    );
  }
  if (id === "recurring") {
    return (
      <svg {...common}>
        <path d="M19.5 12a7.5 7.5 0 10-2.2 5.3" />
        <path d="M19.5 7.5v4.5h-4.5" />
      </svg>
    );
  }
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round">
      <line x1="4" y1="6.5" x2="20" y2="6.5" />
      <circle cx="9.5" cy="6.5" r="2.1" fill="currentColor" stroke="none" />
      <line x1="4" y1="12" x2="20" y2="12" />
      <circle cx="15" cy="12" r="2.1" fill="currentColor" stroke="none" />
      <line x1="4" y1="17.5" x2="20" y2="17.5" />
      <circle cx="7.5" cy="17.5" r="2.1" fill="currentColor" stroke="none" />
    </svg>
  );
}

function SwipeRow({ t, onDelete, deleteLabel, children }) {
  const [dx, setDx] = useState(0);
  const dragging = useRef(false);
  const startX = useRef(0);

  function onDown(e) {
    dragging.current = true;
    startX.current = (e.touches ? e.touches[0].clientX : e.clientX) - dx;
  }
  function onMove(e) {
    if (!dragging.current) return;
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - startX.current;
    setDx(Math.max(-90, Math.min(0, x)));
  }
  function onUp() {
    dragging.current = false;
    setDx(dx < -55 ? -90 : 0);
  }

  return (
    <div style={{ position: "relative", overflow: "hidden", borderRadius: 14 }}>
      <div
        onClick={() => {
          onDelete();
          setDx(0);
        }}
        style={{
          position: "absolute",
          right: 0,
          top: 0,
          bottom: 0,
          width: 90,
          background: t.accent,
          color: "#fff",
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          fontSize: 12,
          fontWeight: 700,
          cursor: "pointer",
        }}
      >
        {deleteLabel}
      </div>
      <div
        onMouseDown={onDown}
        onMouseMove={onMove}
        onMouseUp={onUp}
        onMouseLeave={() => dragging.current && onUp()}
        onTouchStart={onDown}
        onTouchMove={onMove}
        onTouchEnd={onUp}
        style={{ transform: `translateX(${dx}px)`, transition: dragging.current ? "none" : "transform 0.18s", position: "relative" }}
      >
        {children}
      </div>
    </div>
  );
}

              const hf2 = formatDuration(h.hours, statsUnit, lang);
              return (
                <SwipeRow key={h.id} t={t} onDelete={() => deleteHistoryEntry(h.id)} deleteLabel={s.deleteEntry}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 2px", borderBottom: `1px solid ${t.border}`, background: t.bg }}>
                    <div>
                      <div style={{ fontSize: 14, fontWeight: 500 }}>{getCategory(categories, h.category, lang).label}</div>
                      <div style={{ fontSize: 11.5, color: t.subtext }}>
                        {formatMoney(h.price, h.currency || currency)} · {hf2.big} {hf2.unit}
                        {h.followup === "glad" && " · 🙂"}
                        {h.followup === "regret" && " · 😕"}
                      </div>
                    </div>
                    <span style={{ fontSize: 11.5, fontWeight: 700, color: positive ? t.accent : t.decline, background: positive ? t.accentBg : t.declineBg, borderRadius: 20, padding: "4px 10px", whiteSpace: "nowrap" }}>
                      {decisionLabel(h.decision, s)}
                    </span>
                  </div>
                </SwipeRow>
              );
            })}
          </div>
          <button onClick={exportCSV} style={{ ...btnSecondary(t), width: "100%", padding: "10px 0", fontSize: 13 }}>{s.exportCSV}</button>
          <div style={{ fontSize: 10.5, color: t.subtext, marginTop: 6, textAlign: "center" }}>{s.fullBackupHint}</div>
        </div>
      )}

      <Fold t={t} title={s.achievements} subtitle={`(${unlockedAchievements.length}/${ACHIEVEMENTS.length})`} isOpen={achievementsOpen} onToggle={() => setAchievementsOpen(!achievementsOpen)}>
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {ACHIEVEMENTS.map((a) => {
            const unlocked = unlockedAchievements.includes(a.id);
            const progress = unlocked ? null : achievementProgress(a, declineCount, streaks.longest, savedHoursTotal);
            const pct = progress ? Math.min(100, (progress.current / progress.target) * 100) : 0;
            return (
              <div
                key={a.id}
                style={{
                  display: "flex",
                  gap: 12,
                  alignItems: "flex-start",
                  background: unlocked ? t.accentBg : t.cardAlt,
                  border: `1px solid ${unlocked ? t.accent : t.border}`,
                  borderRadius: 12,
                  padding: 12,
                }}
              >
                <div style={{ fontSize: 24, filter: unlocked ? "none" : "grayscale(1)", opacity: unlocked ? 1 : 0.6, lineHeight: 1 }}>{a.icon}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13.5, fontWeight: 700, color: unlocked ? t.text : t.subtext }}>
                    {s[a.titleKey]}
                    {unlocked && <span style={{ color: t.accent }}> ✓</span>}
                  </div>
                  <div style={{ fontSize: 11.5, color: t.subtext, marginTop: 2, lineHeight: 1.4 }}>{s[a.descKey]}</div>
                  {!unlocked && progress && (
                    <div style={{ marginTop: 8 }}>
                      <div style={{ height: 5, borderRadius: 3, background: t.border, overflow: "hidden" }}>
                        <div style={{ height: "100%", width: `${pct}%`, background: t.accent, borderRadius: 3 }} />
                      </div>
                      <div style={{ fontSize: 10.5, color: t.subtext, marginTop: 4 }}>
                        {progress.current} / {progress.target}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </Fold>
    </div>
  );
}

// ================= Recurring tab =================
function RecurringTab({ t, s, currency, recurring, setRecurring, rate, recurringMonthlyHours, lang }) {
  const [name, setName] = useState("");
  const [price, setPrice] = useState("");
  const [cycle, setCycle] = useState("month");

  function add() {
    const p = parseFloat((price || "").replace(",", "."));
    if (!name.trim() || !(p > 0)) return;
    setRecurring((r) => [...r, { id: uid(), name: name.trim(), price: p, cycle }]);
    setName("");
    setPrice("");
  }
  function remove(id) {
    setRecurring((r) => r.filter((x) => x.id !== id));
  }

  const totalHf = formatHours(recurringMonthlyHours, lang);

  return (
    <div>
      <div style={{ background: `linear-gradient(160deg, ${shade(t.ticket, 8)}, ${t.ticket})`, color: "#F5EFE6", borderRadius: 16, padding: 18, marginBottom: 20, boxShadow: `0 6px 20px ${t.ticket}44` }}>
        <div style={{ fontSize: 12.5, opacity: 0.7 }}>{s.subsCostMonth}</div>
        <div style={{ fontFamily: "'Fraunces', serif", fontWeight: 700, fontSize: 32, marginTop: 4 }}>
          {totalHf.big} <span style={{ fontSize: 15, fontWeight: 500 }}>{totalHf.unit}</span>
        </div>
      </div>

      <div style={{ background: t.card, borderRadius: 16, padding: 18, marginBottom: 20 }}>
        <label style={labelStyle(t)}>{s.name}</label>
        <input value={name} onChange={(e) => setName(e.target.value)} placeholder={s.namePlaceholder} style={inputStyle(t)} />
        <div style={{ display: "flex", gap: 10, marginTop: 12 }}>
          <div style={{ flex: 1 }}>
            <label style={labelStyle(t)}>{s.price}</label>
            <div style={{ position: "relative" }}>
              <input value={price} onChange={(e) => setPrice(e.target.value)} inputMode="decimal" placeholder="0" style={{ ...inputStyle(t), paddingRight: 40 }} />
              <span style={{ position: "absolute", right: 12, top: 11, color: t.subtext, fontSize: 13, fontWeight: 600 }}>{CURRENCIES[currency].symbol}</span>
            </div>
          </div>
          <div style={{ flex: 1 }}>
            <label style={labelStyle(t)}>{s.cycle}</label>
            <div style={{ display: "flex", gap: 6 }}>
              {[{ id: "month", l: s.monthly }, { id: "year", l: s.yearly }].map((o) => (
                <button key={o.id} onClick={() => setCycle(o.id)} style={{ flex: 1, padding: "10px 4px", borderRadius: 10, border: cycle === o.id ? `1.5px solid ${t.accent}` : `1px solid ${t.border}`, background: cycle === o.id ? t.accentBg : t.cardAlt, fontSize: 12, fontWeight: 600, color: t.text }}>
                  {o.l}
                </button>
              ))}
            </div>
          </div>
        </div>
        <button onClick={add} style={{ ...btnPrimary(t), width: "100%", marginTop: 14 }}>{s.addSub}</button>
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {recurring.map((r) => {
          const hours = (r.cycle === "year" ? r.price / 12 : r.price) / rate;
          const hf = formatHours(hours, lang);
          return (
            <div key={r.id} style={{ background: t.card, borderRadius: 12, padding: 14, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ fontWeight: 600, fontSize: 14 }}>{r.name}</div>
                <div style={{ fontSize: 12, color: t.subtext, marginTop: 2 }}>
                  {formatMoney(r.price, currency)} {r.cycle === "year" ? s.perYear : s.perMonth} · {hf.big} {hf.unit}{s.perMonth}
                </div>
              </div>
              <button onClick={() => remove(r.id)} style={{ background: "none", border: "none", color: t.subtext, fontSize: 18, cursor: "pointer" }}>✕</button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ================= Settings tab =================
function SettingsTab({ t, s, lang, setLang, themeName, setThemeName, currency, setCurrency, rates, setRates, activeRateId, setActiveRateId, categories, setCategories, notifPerm, requestNotifications, exportJSON, importBackup, importState, resetApp }) {
  const [newRateLabel, setNewRateLabel] = useState("");
  const [newRateValue, setNewRateValue] = useState("");
  const [editRateId, setEditRateId] = useState(null);
  const [editRateValue, setEditRateValue] = useState("");

  const [newCatLabel, setNewCatLabel] = useState("");
  const [open, setOpen] = useState({});
  const toggle = (key) => setOpen((o) => ({ ...o, [key]: !o[key] }));
  const [resetConfirming, setResetConfirming] = useState(false);
  const [newCatIcon, setNewCatIcon] = useState(ICON_CHOICES[0]);

  function addRate() {
    const v = parseFloat(newRateValue.replace(",", "."));
    if (!newRateLabel.trim() || !(v > 0)) return;
    setRates((r) => [...r, { id: uid(), label: newRateLabel.trim(), rate: v }]);
    setNewRateLabel("");
    setNewRateValue("");
  }
  function removeRate(id) {
    if (rates.length <= 1) return;
    setRates((r) => r.filter((x) => x.id !== id));
    if (activeRateId === id) setActiveRateId(rates.find((r) => r.id !== id).id);
  }
  function saveEditRate(id) {
    const v = parseFloat(editRateValue.replace(",", "."));
    if (v > 0) setRates((r) => r.map((x) => (x.id === id ? { ...x, rate: v } : x)));
    setEditRateId(null);
  }

  function addCategory() {
    if (!newCatLabel.trim()) return;
    setCategories((c) => [...c, { id: uid(), label: newCatLabel.trim(), icon: newCatIcon, custom: true }]);
    setNewCatLabel("");
  }
  function removeCategory(id) {
    if (categories.length <= 1) return;
    setCategories((c) => c.filter((x) => x.id !== id));
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
      <Fold t={t} title={s.language} subtitle={`· ${lang.toUpperCase()}`} isOpen={!!open.language} onToggle={() => toggle("language")}>
        <div style={{ display: "flex", gap: 8 }}>
          {["cs", "en", "pl", "es"].map((l) => (
            <button key={l} onClick={() => setLang(l)} style={{ flex: 1, padding: "10px 0", borderRadius: 10, border: lang === l ? `1.5px solid ${t.accent}` : `1px solid ${t.border}`, background: lang === l ? t.accentBg : t.card, color: t.text, fontWeight: 700, fontSize: 13 }}>
              {l.toUpperCase()}
            </button>
          ))}
        </div>
      </Fold>

      <Fold t={t} title={s.appearance} isOpen={!!open.appearance} onToggle={() => toggle("appearance")}>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
          {Object.entries(THEMES).map(([key, th]) => (
            <button key={key} onClick={() => setThemeName(key)} style={{ flex: "1 1 140px", background: th.card, border: themeName === key ? `2px solid ${th.accent}` : `1px solid ${t.border}`, borderRadius: 14, padding: 12, cursor: "pointer", textAlign: "left" }}>
              <div style={{ display: "flex", gap: 6, marginBottom: 10 }}>
                <div style={{ width: 22, height: 22, borderRadius: "50%", background: th.ticket }} />
                <div style={{ width: 22, height: 22, borderRadius: "50%", background: th.accent }} />
                <div style={{ width: 22, height: 22, borderRadius: "50%", background: th.sage }} />
              </div>
              <div style={{ fontSize: 12.5, fontWeight: 700, color: th.text }}>{th.name}</div>
              {themeName === key && <div style={{ fontSize: 10.5, color: th.accent, marginTop: 2, fontWeight: 600 }}>{s.selected}</div>}
            </button>
          ))}
        </div>
      </Fold>

      <Fold t={t} title={s.currency} subtitle={`· ${currency}`} isOpen={!!open.currency} onToggle={() => toggle("currency")}>
        <div style={{ display: "flex", gap: 8 }}>
          {Object.keys(CURRENCIES).map((c) => (
            <button key={c} onClick={() => setCurrency(c)} style={{ flex: 1, padding: "10px 0", borderRadius: 10, border: currency === c ? `1.5px solid ${t.accent}` : `1px solid ${t.border}`, background: currency === c ? t.accentBg : t.card, color: t.text, fontWeight: 600, fontSize: 13 }}>
              {c}
            </button>
          ))}
        </div>
      </Fold>

      <Fold t={t} title={s.hourlyRates} subtitle={`(${rates.length})`} isOpen={!!open.rates} onToggle={() => toggle("rates")}>
        <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 10 }}>
          {rates.map((r) => (
            <div key={r.id} style={{ background: t.card, borderRadius: 12, padding: 12, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ fontWeight: 600, fontSize: 13.5 }}>{rateLabel(r, s)}{activeRateId === r.id ? ` · ${s.active}` : ""}</div>
                {editRateId === r.id ? (
                  <div style={{ display: "flex", gap: 6, marginTop: 6 }}>
                    <input autoFocus value={editRateValue} onChange={(e) => setEditRateValue(e.target.value)} inputMode="decimal" style={{ width: 70, fontSize: 13, border: `1px solid ${t.border}`, borderRadius: 6, padding: "4px 6px", background: t.cardAlt, color: t.text }} />
                    <button onClick={() => saveEditRate(r.id)} style={{ background: t.accent, color: "#fff", border: "none", borderRadius: 6, padding: "4px 8px", fontSize: 12 }}>OK</button>
                  </div>
                ) : (
                  <div style={{ fontSize: 12, color: t.subtext, marginTop: 2 }}>{r.rate.toLocaleString(LOCALES[lang])} {CURRENCIES[currency].symbol}/h</div>
                )}
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                {editRateId !== r.id && <button onClick={() => { setEditRateId(r.id); setEditRateValue(String(r.rate)); }} style={{ background: "none", border: "none", color: t.subtext, fontSize: 13, cursor: "pointer" }}>✎</button>}
                {rates.length > 1 && <button onClick={() => removeRate(r.id)} style={{ background: "none", border: "none", color: t.subtext, fontSize: 16, cursor: "pointer" }}>✕</button>}
              </div>
            </div>
          ))}
        </div>
        <div style={{ background: t.card, borderRadius: 12, padding: 12 }}>
          <div style={{ display: "flex", gap: 8 }}>
            <input value={newRateLabel} onChange={(e) => setNewRateLabel(e.target.value)} placeholder={s.rateNamePlaceholder} style={{ ...inputStyle(t), flex: 1.4, padding: "8px 10px", fontSize: 13 }} />
            <input value={newRateValue} onChange={(e) => setNewRateValue(e.target.value)} inputMode="decimal" placeholder={s.ratePlaceholder} style={{ ...inputStyle(t), flex: 1, padding: "8px 10px", fontSize: 13 }} />
          </div>
          <button onClick={addRate} style={{ ...btnSecondary(t), width: "100%", marginTop: 10, padding: "9px 0", fontSize: 13 }}>{s.addRate}</button>
        </div>
        <div style={{ fontSize: 11, color: t.subtext, marginTop: 8, lineHeight: 1.5 }}>{s.quickEntryHint}</div>
      </Fold>

      <Fold t={t} title={s.categories} subtitle={`(${categories.length})`} isOpen={!!open.categories} onToggle={() => toggle("categories")}>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 10 }}>
          {categories.map((c) => {
            const cat = getCategory(categories, c.id, lang);
            return (
              <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 6, background: t.card, borderRadius: 20, padding: "6px 10px 6px 12px" }}>
                <span style={{ fontSize: 14 }}>{cat.icon}</span>
                <span style={{ fontSize: 12.5, fontWeight: 600 }}>{cat.label}</span>
                {categories.length > 1 && <button onClick={() => removeCategory(c.id)} style={{ background: "none", border: "none", color: t.subtext, fontSize: 13, cursor: "pointer", padding: 0 }}>✕</button>}
              </div>
            );
          })}
        </div>
        <div style={{ background: t.card, borderRadius: 12, padding: 12 }}>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 8 }}>
            {ICON_CHOICES.map((ic) => (
              <button key={ic} onClick={() => setNewCatIcon(ic)} style={{ width: 30, height: 30, borderRadius: 8, border: newCatIcon === ic ? `1.5px solid ${t.accent}` : `1px solid ${t.border}`, background: newCatIcon === ic ? t.accentBg : t.cardAlt, fontSize: 14 }}>
                {ic}
              </button>
            ))}
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <input value={newCatLabel} onChange={(e) => setNewCatLabel(e.target.value)} placeholder={s.newCategory} style={{ ...inputStyle(t), flex: 1, padding: "8px 10px", fontSize: 13 }} />
            <button onClick={addCategory} style={{ ...btnSecondary(t), padding: "0 16px", fontSize: 13 }}>{s.add}</button>
          </div>
        </div>
      </Fold>

      <Fold t={t} title={s.notifications} isOpen={!!open.notifications} onToggle={() => toggle("notifications")}>
        <div style={{ background: t.card, borderRadius: 12, padding: 14 }}>
          <div style={{ fontSize: 12.5, color: t.subtext, marginBottom: 10, lineHeight: 1.5 }}>{s.notifDesc}</div>
          {notifPerm === "granted" ? (
            <div style={{ fontSize: 13, fontWeight: 600, color: t.sage }}>{s.notifGranted}</div>
          ) : notifPerm === "unsupported" ? (
            <div style={{ fontSize: 13, color: t.subtext }}>{s.notifUnsupported}</div>
          ) : (
            <button onClick={requestNotifications} style={{ ...btnSecondary(t), width: "100%", padding: "9px 0", fontSize: 13 }}>{s.notifRequest}</button>
          )}
        </div>
      </Fold>

      <Fold t={t} title={s.backup} isOpen={!!open.backup} onToggle={() => toggle("backup")}>
        <div style={{ background: t.card, borderRadius: 12, padding: 14 }}>
          <div style={{ fontSize: 12.5, color: t.subtext, marginBottom: 12, lineHeight: 1.5 }}>{s.backupDesc}</div>
          <button onClick={exportJSON} style={{ ...btnSecondary(t), width: "100%", padding: "10px 0", fontSize: 13, marginBottom: 8 }}>
            {s.backupExport}
          </button>
          <label
            htmlFor="backup-import-input"
            style={{
              display: "block",
              width: "100%",
              boxSizing: "border-box",
              textAlign: "center",
              background: "none",
              color: t.text,
              border: `1.5px solid ${t.border}`,
              borderRadius: 12,
              padding: "9px 0",
              fontSize: 13,
              fontWeight: 600,
              cursor: "pointer",
            }}
          >
            {s.backupImport}
            <input
              id="backup-import-input"
              type="file"
              accept="application/json"
              style={{ display: "none" }}
              onChange={(e) => {
                const f = e.target.files && e.target.files[0];
                e.target.value = "";
                if (f) importBackup(f);
              }}
            />
          </label>
          {importState === "success" && <div style={{ fontSize: 12, color: t.sage, marginTop: 8 }}>{s.backupImportSuccess}</div>}
          {importState === "error" && <div style={{ fontSize: 12, color: t.accent, marginTop: 8 }}>{s.backupImportError}</div>}
        </div>
      </Fold>

      <Fold t={t} title={s.resetApp} isOpen={!!open.reset} onToggle={() => toggle("reset")}>
        <div style={{ background: t.card, borderRadius: 12, padding: 14 }}>
          <div style={{ fontSize: 12.5, color: t.subtext, marginBottom: 10, lineHeight: 1.5 }}>{s.resetDesc}</div>
          {!resetConfirming ? (
            <button onClick={() => setResetConfirming(true)} style={{ ...btnGhost(t), width: "100%", padding: "9px 0", fontSize: 13 }}>
              {s.resetApp}
            </button>
          ) : (
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={resetApp} style={{ ...btnPrimary(t), flex: 1, padding: "9px 0", fontSize: 13 }}>
                {s.resetConfirm}
              </button>
              <button onClick={() => setResetConfirming(false)} style={{ ...btnSecondary(t), flex: 1, padding: "9px 0", fontSize: 13 }}>
                {s.resetCancel}
              </button>
            </div>
          )}
        </div>
      </Fold>
    </div>
  );
}

const labelStyle = (t) => ({ display: "block", fontSize: 12.5, fontWeight: 600, color: t.subtext, marginBottom: 6 });
const inputStyle = (t) => ({ width: "100%", boxSizing: "border-box", border: `1px solid ${t.border}`, borderRadius: 10, padding: "11px 13px", fontSize: 15, fontFamily: "'Inter', sans-serif", color: t.text, background: t.cardAlt, outline: "none" });
const btnPrimary = (t) => ({ background: t.accent, color: "#fff", border: "none", borderRadius: 12, padding: "13px 0", fontSize: 15, fontWeight: 700, cursor: "pointer" });
const btnSecondary = (t) => ({ background: t.accentBg, color: t.text, border: `1.5px solid ${t.border}`, borderRadius: 12, padding: "13px 0", fontSize: 15, fontWeight: 700, cursor: "pointer" });
const btnGhost = (t) => ({ background: "none", color: t.decline, border: `1.5px solid ${t.decline}`, borderRadius: 12, padding: "13px 0", fontSize: 15, fontWeight: 700, cursor: "pointer" });
const btnThink = (t) => ({ background: t.think, color: "#fff", border: "none", borderRadius: 12, padding: "13px 0", fontSize: 15, fontWeight: 700, cursor: "pointer" });
const btnDecline = (t) => ({ background: t.decline, color: "#fff", border: "none", borderRadius: 12, padding: "13px 0", fontSize: 15, fontWeight: 700, cursor: "pointer" });
const sectionTitle = (t) => ({ fontFamily: "'Fraunces', serif", fontWeight: 600, fontSize: 14.5, color: t.text, marginBottom: 10, letterSpacing: "0.01em" });
const dotSide = { position: "absolute", top: -8, width: 16, height: 16, borderRadius: "50%" };

function Fold({ t, title, subtitle, isOpen, onToggle, children }) {
  return (
    <div>
      <button
        onClick={onToggle}
        style={{ background: "none", border: "none", padding: 0, width: "100%", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", marginBottom: isOpen ? 10 : 0 }}
      >
        <div style={{ ...sectionTitle(t), marginBottom: 0 }}>
          {title} {subtitle && <span style={{ color: t.subtext, fontWeight: 500 }}>{subtitle}</span>}
        </div>
        <span style={{ color: t.subtext, fontSize: 13, transform: isOpen ? "rotate(180deg)" : "none", transition: "transform 0.15s" }}>▾</span>
      </button>
      {isOpen && children}
    </div>
  );
}

  ReactDOM.createRoot(document.getElementById("root")).render(<WorkHoursApp />);
</script>
</body>
</html>
